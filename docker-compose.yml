services:
  backend:
    image: ${BACKEND_IMAGE:-myconnect-backend}
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5100:5100"
    environment:
      - PORT=5100
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENGINE_API_URL=http://engine:8000/api/v1
    depends_on:
      - engine
      - db

  engine:
    image: ${ENGINE_IMAGE:-myconnect-engine}
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_VERSION=1.0.0
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-myconnect}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
